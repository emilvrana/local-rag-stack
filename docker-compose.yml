version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: rag_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ragdb}
      POSTGRES_USER: ${POSTGRES_USER:-raguser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-RagPass2025}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${PG_PORT:-5433}:5432" # Use 5433 by default to avoid conflict with local postgres
    restart: unless-stopped

  embeddings:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.5
    container_name: rag_embeddings
    environment:
      - MODEL_ID=BAAI/bge-base-en-v1.5
    ports:
      - "${EMBEDDINGS_PORT:-8081}:80"
    restart: unless-stopped

  llm:
    image: ollama/ollama:latest
    container_name: rag_llm
    volumes:
      - ollama_data:/root/.ollama
      - ./ollama-entrypoint.sh:/entrypoint.sh
    ports:
      - "${LLM_PORT:-8080}:11434"
    # Pull model on startup if not present
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    environment:
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:7b}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "ps"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Alternative: llama.cpp for direct GGUF serving
  # Uncomment this and comment out the 'llm' service above if you prefer llama.cpp
  # llm:
  #   image: ghcr.io/ggerganov/llama.cpp:server
  #   container_name: rag_llm
  #   volumes:
  #     - ./models:/models
  #   command: -m /models/your-model.gguf -c 4096 --host 0.0.0.0 --port 8080
  #   ports:
  #     - "8080:8080"
  #   restart: unless-stopped

volumes:
  postgres_data:
  ollama_data:
